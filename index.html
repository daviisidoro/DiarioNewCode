<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEW CODE - Diário Escolar</title>
    
    <!-- Importando Tailwind CSS para os estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Importando ícones (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-slate-100 font-sans text-slate-800 pb-12 overflow-x-hidden w-full">

    <!-- Cabeçalho Centralizado -->
    <header class="bg-slate-900 text-white shadow-md border-b-4 border-cyan-500 w-full relative">
        <div class="max-w-7xl mx-auto px-4 py-4 min-h-[70px] flex items-center justify-center">
            <div class="flex flex-col items-center justify-center text-center">
                <div class="flex items-center gap-2">
                    <i data-lucide="monitor-play" class="w-6 h-6 sm:w-7 sm:h-7 text-cyan-400"></i>
                    <h1 class="text-xl sm:text-2xl font-bold tracking-wider leading-none">NEW CODE</h1>
                </div>
                <p class="text-[10px] sm:text-xs text-slate-400 font-medium tracking-widest uppercase mt-1">
                    Diário Escolar
                </p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-2 sm:px-4 lg:px-8 mt-4 sm:mt-6 space-y-4 sm:space-y-6 w-full">
        
        <!-- Painel de Seleção -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 sm:p-5">
            <h2 class="text-xs sm:text-sm font-semibold text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                <i data-lucide="search" class="w-4 h-4"></i> Ambiente
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4">
                <div class="relative">
                    <label class="block text-[11px] sm:text-xs font-medium text-slate-500 mb-1">Instituição de Ensino</label>
                    <div class="relative">
                        <select id="escolaSelect" onchange="handleEscolaChange(event)" class="w-full appearance-none bg-slate-50 border border-slate-300 text-slate-800 rounded-lg pl-3 pr-8 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 font-medium">
                            <!-- Opções preenchidas via JS -->
                        </select>
                        <i data-lucide="chevron-down" class="absolute right-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>

                <div class="relative">
                    <label class="block text-[11px] sm:text-xs font-medium text-slate-500 mb-1">Turma</label>
                    <div class="relative">
                        <select id="turmaSelect" onchange="handleTurmaChange(event)" class="w-full appearance-none bg-slate-50 border border-slate-300 text-slate-800 rounded-lg pl-3 pr-8 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 font-medium">
                            <!-- Opções preenchidas via JS -->
                        </select>
                        <i data-lucide="chevron-down" class="absolute right-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Formulário de Nova Aula -->
        <form onsubmit="adicionarAula(event)" class="bg-cyan-50 rounded-xl shadow-sm border border-cyan-100 p-3 sm:p-5 flex flex-col md:flex-row items-start md:items-end gap-3 sm:gap-4">
            <div class="w-full md:w-auto md:flex-1">
                <label class="block text-[11px] sm:text-xs font-semibold text-cyan-800 mb-1 flex items-center gap-1">
                    <i data-lucide="calendar" class="w-3 h-3"></i> Data
                </label>
                <input id="novaData" type="date" required class="w-full bg-white border border-cyan-200 text-slate-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500" />
            </div>
            <div class="w-full md:w-auto md:flex-[2]">
                <label class="block text-[11px] sm:text-xs font-semibold text-cyan-800 mb-1 flex items-center gap-1">
                    <i data-lucide="book-open" class="w-3 h-3"></i> Matéria Trabalhada
                </label>
                <input id="novoConteudo" type="text" required placeholder="Ex: Lógica com Minecraft" class="w-full bg-white border border-cyan-200 text-slate-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500" />
            </div>
            <button type="submit" class="w-full md:w-auto bg-cyan-600 hover:bg-cyan-700 text-white font-medium rounded-lg px-4 py-2 sm:py-2.5 transition-colors flex items-center justify-center gap-2 text-sm shadow-sm">
                <i data-lucide="plus" class="w-4 h-4"></i> Registrar Aula
            </button>
        </form>

        <!-- Container da Tabela (Renderizado via JS) -->
        <div id="tableContainer" class="bg-white rounded-xl shadow-md border border-slate-200 flex flex-col w-full overflow-hidden">
            <!-- Tabela entra aqui -->
        </div>

    </main>

    <!-- LÓGICA DO APLICATIVO EM JAVASCRIPT PURO -->
    <script>
        // --- DADOS INICIAIS ---
        const escolas = [
            { id: 'concept', nome: 'Escola Concept' },
            { id: 'conte', nome: 'Colégio Conte' },
            { id: 'primeira', nome: 'Escola Primeira' },
            { id: 'bright', nome: 'Bright Kids' }
        ];

        const turmasPorEscola = {
            concept: [
                { id: 'c_mc_rb', nome: 'Minecraft Education e Roblox Studio', dia: 'Segunda-feira' }
            ],
            conte: [
                { id: 'co_sc_1', nome: '1º Ano - Scratch JR', dia: 'Segunda-feira' },
                { id: 'co_mc_x', nome: 'Minecraft Education', dia: 'Sexta-feira' }
            ],
            primeira: [
                { id: 'pr_sc_1', nome: '1º Ano - Scratch JR', dia: 'Quarta-feira' },
                { id: 'pr_sc_2', nome: '2º Ano - Scratch JR', dia: 'Quarta-feira' },
                { id: 'pr_kd_3', nome: '3º Ano - Kodu Game Lab', dia: 'Quarta-feira' },
                { id: 'pr_sc_4', nome: '4º Ano - Scratch 3.0', dia: 'Quarta-feira' }
            ],
            bright: [
                { id: 'bk_sc_1', nome: '1º Ano - Scratch JR', dia: 'Quinta-feira' },
                { id: 'bk_kd_2', nome: '2º Ano - Kodu Game Lab', dia: 'Quinta-feira' },
                { id: 'bk_kd_3', nome: '3º Ano - Kodu Game Lab', dia: 'Quinta-feira' },
                { id: 'bk_sc_4', nome: '4º Ano - Scratch 3.0', dia: 'Quinta-feira' },
                { id: 'bk_c3_5', nome: '5º Ano - Construct 3', dia: 'Quinta-feira' }
            ]
        };

        let alunosPorTurma = {
            'c_mc_rb': [
                { id: 'a1', nome: 'Eduardo Costa Vieira' },
                { id: 'a2', nome: 'João Telles De Carvalho' },
                { id: 'a3', nome: 'Lucas Mafort Pereira Sales Guimaraes' },
                { id: 'a4', nome: 'Caio Jikal' },
                { id: 'a5', nome: 'João Vicente' },
                { id: 'a6', nome: 'Minato teu kaishima le' }
            ],
            'pr_sc_1': [
                { id: 'a7', nome: 'Alice Martins' },
                { id: 'a8', nome: 'Bernardo Silva' },
                { id: 'a9', nome: 'Clara Mendes' }
            ]
        };

        let diario = {
            'c_mc_rb': {
                aulas: [
                    { id: 'aula_1', data: '2026-04-01', conteudo: 'Introdução ao Minecraft' },
                    { id: 'aula_2', data: '2026-04-08', conteudo: 'Lógica com Redstone' }
                ],
                presencas: {
                    'a1': { 'aula_1': 'F', 'aula_2': 'P' },
                    'a2': { 'aula_1': 'F', 'aula_2': 'P' },
                    'a3': { 'aula_1': 'F', 'aula_2': 'F' },
                    'a4': { 'aula_1': 'F', 'aula_2': 'F' },
                    'a5': { 'aula_1': 'F', 'aula_2': 'P' },
                    'a6': { 'aula_1': '', 'aula_2': 'P' }
                }
            }
        };

        // Estados globais
        let escolaSelecionada = 'concept';
        let turmaSelecionada = 'c_mc_rb';
        let editandoAlunoId = null;
        let alunoParaDeletar = null;

        // Formatação de data
        function formatDate(dateString) {
            const parts = dateString.split('-');
            if(parts.length !== 3) return dateString;
            return `${parts[2]}/${parts[1]}`;
        }

        // Inicialização
        function init() {
            const escolaSelect = document.getElementById('escolaSelect');
            escolaSelect.innerHTML = escolas.map(esc => `<option value="${esc.id}">${esc.nome}</option>`).join('');
            escolaSelect.value = escolaSelecionada;
            
            renderTurmaOptions();
            renderTable();
        }

        // Atualização de selects
        function renderTurmaOptions() {
            const turmaSelect = document.getElementById('turmaSelect');
            const turmas = turmasPorEscola[escolaSelecionada] || [];
            turmaSelect.innerHTML = turmas.map(t => `<option value="${t.id}">${t.nome} (${t.dia})</option>`).join('');
            turmaSelect.value = turmaSelecionada;
        }

        // Eventos de mudança
        window.handleEscolaChange = function(e) {
            escolaSelecionada = e.target.value;
            turmaSelecionada = turmasPorEscola[escolaSelecionada][0].id;
            editandoAlunoId = null;
            alunoParaDeletar = null;
            renderTurmaOptions();
            renderTable();
        };

        window.handleTurmaChange = function(e) {
            turmaSelecionada = e.target.value;
            editandoAlunoId = null;
            alunoParaDeletar = null;
            renderTable();
        };

        // Funções de manipulação do Diário
        window.adicionarAula = function(e) {
            e.preventDefault();
            const dataInput = document.getElementById('novaData');
            const conteudoInput = document.getElementById('novoConteudo');
            
            if (!dataInput.value || !conteudoInput.value) return;

            const novaAulaId = `aula_${Date.now()}`;
            const novaAula = { id: novaAulaId, data: dataInput.value, conteudo: conteudoInput.value };

            if (!diario[turmaSelecionada]) {
                diario[turmaSelecionada] = { aulas: [], presencas: {} };
            }

            diario[turmaSelecionada].aulas.push(novaAula);
            diario[turmaSelecionada].aulas.sort((a, b) => new Date(a.data) - new Date(b.data));

            const alunosAtuais = alunosPorTurma[turmaSelecionada] || [];
            alunosAtuais.forEach(aluno => {
                if (!diario[turmaSelecionada].presencas[aluno.id]) {
                    diario[turmaSelecionada].presencas[aluno.id] = {};
                }
                diario[turmaSelecionada].presencas[aluno.id][novaAulaId] = '';
            });

            dataInput.value = '';
            conteudoInput.value = '';
            renderTable();
        };

        window.alternarPresenca = function(alunoId, aulaId) {
            if (!diario[turmaSelecionada]) return;
            
            const presencas = diario[turmaSelecionada].presencas;
            const statusAtual = presencas[alunoId]?.[aulaId] || '';
            
            let novoStatus = 'P';
            if (statusAtual === 'P') novoStatus = 'F';
            if (statusAtual === 'F') novoStatus = '';

            if (!presencas[alunoId]) presencas[alunoId] = {};
            presencas[alunoId][aulaId] = novoStatus;
            
            renderTable();
        };

        // Funções de manipulação de Alunos
        window.adicionarAluno = function(e) {
            e.preventDefault();
            const input = document.getElementById('novoAlunoNome');
            const nome = input.value.trim();
            if (!nome) return;

            const novoId = `aluno_${Date.now()}`;
            const novoAluno = { id: novoId, nome: nome };

            if (!alunosPorTurma[turmaSelecionada]) alunosPorTurma[turmaSelecionada] = [];
            alunosPorTurma[turmaSelecionada].push(novoAluno);

            if (diario[turmaSelecionada] && diario[turmaSelecionada].aulas) {
                if(!diario[turmaSelecionada].presencas[novoId]) diario[turmaSelecionada].presencas[novoId] = {};
                diario[turmaSelecionada].aulas.forEach(aula => {
                    diario[turmaSelecionada].presencas[novoId][aula.id] = '';
                });
            }

            renderTable();
        };

        window.iniciarEdicao = function(id) {
            editandoAlunoId = id;
            alunoParaDeletar = null;
            renderTable();
        };

        window.salvarEdicaoAluno = function(id) {
            const input = document.getElementById('editInput_' + id);
            const nome = input.value.trim();
            if (nome) {
                alunosPorTurma[turmaSelecionada] = alunosPorTurma[turmaSelecionada].map(a => 
                    a.id === id ? { ...a, nome: nome } : a
                );
            }
            editandoAlunoId = null;
            renderTable();
        };

        window.cancelarEdicao = function() {
            editandoAlunoId = null;
            renderTable();
        };

        window.iniciarDelecao = function(id) {
            alunoParaDeletar = id;
            editandoAlunoId = null;
            renderTable();
        };

        window.confirmarDelecao = function(id) {
            alunosPorTurma[turmaSelecionada] = alunosPorTurma[turmaSelecionada].filter(a => a.id !== id);
            alunoParaDeletar = null;
            renderTable();
        };

        window.cancelarDelecao = function() {
            alunoParaDeletar = null;
            renderTable();
        };

        // Renderizador da Tabela Dinâmica
        function renderTable() {
            const container = document.getElementById('tableContainer');
            const turmasAtuais = turmasPorEscola[escolaSelecionada] || [];
            const turmaAtualInfo = turmasAtuais.find(t => t.id === turmaSelecionada);
            const escolaAtualInfo = escolas.find(e => e.id === escolaSelecionada);
            
            const alunosAtuais = alunosPorTurma[turmaSelecionada] || [];
            const dadosTurma = diario[turmaSelecionada] || { aulas: [], presencas: {} };

            // Cabeçalho da tabela (Header Bar)
            let html = `
                <div class="bg-[#1e3a5f] text-white px-3 sm:px-5 py-2 sm:py-3 border-b-4 border-cyan-500 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-1">
                    <h3 class="font-semibold text-sm sm:text-base tracking-wide uppercase text-center sm:text-left">
                        Lista de Presença
                    </h3>
                    <div class="text-[10px] sm:text-xs font-medium text-cyan-200 text-center sm:text-right truncate">
                        ${escolaAtualInfo?.nome || ''} • ${turmaAtualInfo?.dia || ''}
                    </div>
                </div>
                <div class="w-full overflow-x-auto relative">
                    <table class="w-full text-left border-collapse min-w-max">
                        <thead>
                            <tr class="bg-[#2a4d7c] text-white text-[10px] sm:text-xs uppercase tracking-wider">
                                <th class="px-2 sm:px-4 py-2 sm:py-3 font-semibold w-[150px] sm:w-[220px] md:w-80 sticky left-0 bg-[#2a4d7c] z-20 border-r border-[#1e3a5f]">
                                    Aluno
                                </th>
            `;

            // Colunas de Aulas
            if (dadosTurma.aulas.length === 0) {
                html += `<th class="px-3 py-2 sm:py-4 font-normal text-slate-300 italic text-center w-full">Nenhuma aula registada</th>`;
            } else {
                dadosTurma.aulas.forEach(aula => {
                    html += `
                        <th class="px-1 sm:px-2 py-1 sm:py-2 font-semibold text-center min-w-[70px] sm:min-w-[100px] border-l border-[#1e3a5f]">
                            <div class="text-white text-xs sm:text-sm mb-0.5">${formatDate(aula.data)}</div>
                            <div class="text-[9px] sm:text-[10px] text-cyan-200 font-medium normal-case truncate max-w-[65px] sm:max-w-[100px] mx-auto" title="${aula.conteudo}">
                                ${aula.conteudo}
                            </div>
                        </th>
                    `;
                });
            }
            html += `</tr></thead><tbody class="divide-y divide-slate-200">`;

            // Linhas de Alunos
            alunosAtuais.forEach(aluno => {
                html += `<tr class="group hover:bg-slate-50 transition-colors">`;
                
                // Célula do Nome
                html += `<td class="px-2 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm sticky left-0 bg-white group-hover:bg-slate-50 z-10 border-r border-slate-200">`;
                
                if (editandoAlunoId === aluno.id) {
                    html += `
                        <div class="flex items-center gap-1">
                            <input id="editInput_${aluno.id}" type="text" value="${aluno.nome}" onkeydown="if(event.key === 'Enter') salvarEdicaoAluno('${aluno.id}')" class="flex-1 min-w-0 bg-white border border-cyan-300 rounded px-1 py-1 text-xs sm:text-sm focus:outline-none" autofocus />
                            <button type="button" onclick="salvarEdicaoAluno('${aluno.id}')" class="text-emerald-600 p-1 flex-shrink-0">
                                <i data-lucide="save" class="w-3.5 h-3.5 sm:w-4 sm:h-4"></i>
                            </button>
                            <button type="button" onclick="cancelarEdicao()" class="text-slate-400 p-1 flex-shrink-0">
                                <i data-lucide="x" class="w-3.5 h-3.5 sm:w-4 sm:h-4"></i>
                            </button>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-1">
                            <span class="font-medium text-slate-800 truncate block w-full" title="${aluno.nome}">
                                ${aluno.nome}
                            </span>
                            <div class="flex items-center gap-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity flex-shrink-0">
                    `;
                    
                    if (alunoParaDeletar === aluno.id) {
                        html += `
                            <div class="flex items-center gap-1 bg-rose-50 px-1.5 py-0.5 rounded">
                                <span class="text-[10px] text-rose-600 font-medium hidden sm:inline">Excluir?</span>
                                <button type="button" onclick="confirmarDelecao('${aluno.id}')" class="text-white bg-rose-500 rounded px-1.5 py-0.5 text-[10px] font-medium">Sim</button>
                                <button type="button" onclick="cancelarDelecao()" class="text-slate-500 bg-slate-200 rounded px-1.5 py-0.5 text-[10px] font-medium">Não</button>
                            </div>
                        `;
                    } else {
                        html += `
                            <button type="button" onclick="iniciarEdicao('${aluno.id}')" class="p-1 sm:p-1.5 text-slate-400 hover:text-cyan-600 hover:bg-cyan-50 rounded" title="Editar">
                                <i data-lucide="pencil" class="w-3 h-3 sm:w-3.5 sm:h-3.5"></i>
                            </button>
                            <button type="button" onclick="iniciarDelecao('${aluno.id}')" class="p-1 sm:p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded" title="Remover">
                                <i data-lucide="trash-2" class="w-3 h-3 sm:w-3.5 sm:h-3.5"></i>
                            </button>
                        `;
                    }
                    html += `</div></div>`;
                }
                html += `</td>`;

                // Células de Presença
                if (dadosTurma.aulas.length === 0) {
                    html += `<td class="px-3 py-2 text-center text-slate-300">-</td>`;
                } else {
                    dadosTurma.aulas.forEach(aula => {
                        const status = dadosTurma.presencas[aluno.id]?.[aula.id] || '';
                        let btnStyle = "bg-white text-transparent border-slate-200";
                        if (status === 'P') btnStyle = "bg-emerald-50 text-emerald-700 border-emerald-300 font-bold";
                        if (status === 'F') btnStyle = "bg-rose-50 text-rose-700 border-rose-300 font-bold";

                        html += `
                            <td class="px-1 sm:px-2 py-1 sm:py-2 text-center border-l border-slate-200 bg-slate-50/30">
                                <button type="button" onclick="alternarPresenca('${aluno.id}', '${aula.id}')" class="w-7 h-7 sm:w-9 sm:h-9 mx-auto rounded border text-sm sm:text-base flex items-center justify-center transition-all ${btnStyle}">
                                    ${status}
                                </button>
                            </td>
                        `;
                    });
                }
                html += `</tr>`;
            });

            html += `</tbody><tfoot><tr class="bg-slate-100 border-t border-slate-200">`;
            
            // Rodapé - Adicionar Aluno
            html += `
                <td class="px-2 sm:px-4 py-2 sticky left-0 bg-slate-100 z-10 border-r border-slate-200">
                    <form onsubmit="adicionarAluno(event)" class="flex items-center gap-1 sm:gap-2">
                        <div class="relative flex-1 min-w-0">
                            <div class="absolute inset-y-0 left-0 pl-1.5 sm:pl-2 flex items-center pointer-events-none">
                                <i data-lucide="user-plus" class="w-3 h-3 sm:w-4 sm:h-4 text-slate-400"></i>
                            </div>
                            <input id="novoAlunoNome" type="text" placeholder="Novo aluno..." class="w-full bg-white border border-slate-300 text-slate-800 rounded md:rounded-lg pl-6 sm:pl-8 pr-2 py-1 sm:py-1.5 text-[11px] sm:text-sm focus:outline-none focus:ring-1 focus:ring-cyan-500" />
                        </div>
                        <button type="submit" class="bg-[#2a4d7c] text-white p-1 sm:p-1.5 rounded md:rounded-lg flex-shrink-0">
                            <i data-lucide="plus" class="w-3 h-3 sm:w-4 sm:h-4"></i>
                        </button>
                    </form>
                </td>
            `;

            if (dadosTurma.aulas.length === 0) {
                html += `<td></td>`;
            } else {
                html += `<td colspan="${dadosTurma.aulas.length}" class="bg-slate-100 border-l border-slate-200"></td>`;
            }

            html += `</tr></tfoot></table></div>`;
            
            // Info de rodapé
            html += `
                <div class="bg-slate-50 border-t border-slate-200 px-3 sm:px-5 py-2 sm:py-3 text-[10px] sm:text-xs text-slate-500 flex flex-col sm:flex-row justify-between items-center sm:items-start text-center sm:text-left gap-1">
                    <span>Toque para alternar: <strong class="text-emerald-600">P</strong>, <strong class="text-rose-600">F</strong> ou Vazio.</span>
                    <span>${alunosAtuais.length} alunos</span>
                </div>
            `;

            container.innerHTML = html;
            
            // Re-renderizar ícones inseridos dinamicamente
            lucide.createIcons();
            
            // Focar input se estiver editando
            if (editandoAlunoId) {
                const input = document.getElementById('editInput_' + editandoAlunoId);
                if (input) {
                    input.focus();
                    // Move cursor to end
                    const val = input.value;
                    input.value = '';
                    input.value = val;
                }
            }
        }

        // Iniciar aplicação
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
